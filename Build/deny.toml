# cargo-deny configuration for the Saikuro workspace.
# (modified from an online example)
#
# Run:  cargo deny --manifest-path Build/Cargo.toml check
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
# Evaluate the full dependency graph, including dev-dependencies.
all-features = true

# ---------------------------------------------------------------------------
# Licenses
# ---------------------------------------------------------------------------

[licenses]
# Confidence threshold for license detection (0.0 - 1.0).
confidence-threshold = 0.8

# Every license in the dependency tree must match one of these.  The list
# covers the set used by the workspace's direct and transitive dependencies.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "Unicode-3.0",
]

# Crates whose LICENSE files are not machine-readable but are known-good.
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[[licenses.clarify]]
name = "webpki"
expression = "ISC"
license-files = [{ path = "LICENSE", hash = 0x001c7e6c }]

# ---------------------------------------------------------------------------
# Bans
# ---------------------------------------------------------------------------

[bans]
# Warn on duplicate crate versions; specific exceptions are listed in skip.
multiple-versions = "warn"

# Crates that must never appear in the dependency tree.
deny = [
    # openssl: requires a system library; use rustls instead.
    { name = "openssl" },
    { name = "openssl-sys" },
]

# Allow known-duplicate crates from transitive dependencies.
skip = [
    { name = "thiserror" },    # 1.x vs 2.x in transitive deps
    { name = "thiserror-impl" },
    { name = "windows-sys" },
    # tungstenite -> rand 0.8 -> rand_core -> getrandom 0.2
    # uuid -> getrandom 0.4
    # Both chains are external; nothing in the workspace controls either pin.
    { name = "getrandom" },
]

# ---------------------------------------------------------------------------
# Advisories
# ---------------------------------------------------------------------------

[advisories]
# Fetch the RustSec advisory database and deny any crates with known
# vulnerabilities.
version = 2
ignore = []

# ---------------------------------------------------------------------------
# Sources
# ---------------------------------------------------------------------------

[sources]
# Only allow crates from crates.io and local paths.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
