[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "saikuro"
version = "0.1.0"
description = "Python adapter for the Saikuro cross-language invocation fabric"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [
    { name = "NellowTCS" },
]
keywords = ["ipc", "cross-language", "rpc", "msgpack"]
dependencies = [
    "websockets>=13.0",
    "msgpack>=1.0",
]

[project.urls]
Repository = "https://github.com/Nisoku/Saikuro"
Homepage   = "https://github.com/Nisoku/Saikuro"

[project.scripts]
saikuro-schema = "saikuro.cli:main"

[project.optional-dependencies]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
    "anyio[trio]>=4.0",
]
websocket = [
    "websockets>=16.0",
]

[tool.hatch.build.targets.wheel]
packages = ["saikuro"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
