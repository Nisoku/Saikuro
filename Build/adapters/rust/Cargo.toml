[package]
name = "saikuro"
version = "0.1.0"
edition = "2021"
authors = ["NellowTCS"]
license = "Apache-2.0"
repository = "https://github.com/Nisoku/Saikuro"
description = "Rust adapter for the Saikuro runtime"
rust-version = "1.75"
keywords = ["ipc", "cross-language", "rpc", "msgpack", "saikuro"]
categories = ["network-programming", "asynchronous"]

[[bin]]
name = "saikuro-rust-schema"
path = "src/cli/saikuro_rust_schema.rs"

[features]
default = ["tcp", "unix", "ws"]
tcp  = ["saikuro-transport/native-transport"]
unix = ["saikuro-transport/native-transport"]
ws   = ["saikuro-transport/ws-transport"]

[dependencies]
saikuro-core      = { path = "../../crates/saikuro-core" }
saikuro-transport = { path = "../../crates/saikuro-transport" }

serde       = { version = "1.0", features = ["derive"] }
serde_json  = "1.0"
rmp-serde   = "1.3"
bytes       = "1.7"
tokio       = { version = "1.40", features = ["full"] }
futures     = "0.3"
async-trait = "0.1"
tokio-util  = { version = "0.7", features = ["codec"] }
tracing     = "0.1"
thiserror   = "2.0"
dashmap     = "6.1"
uuid        = { version = "1.10", features = ["v4"] }
clap        = { version = "4.5", features = ["derive"] }
syn         = { version = "2.0", features = ["full"] }

[dev-dependencies]
tokio-test = "0.4"
