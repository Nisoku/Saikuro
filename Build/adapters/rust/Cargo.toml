[package]
name = "saikuro"
version = "0.1.0"
edition = "2021"
authors = ["NellowTCS"]
license = "Apache-2.0"
repository = "https://github.com/Nisoku/Saikuro"
description = "Rust adapter for the Saikuro runtime"
rust-version = "1.75"
keywords = ["ipc", "cross-language", "rpc", "msgpack", "saikuro"]
categories = ["network-programming", "asynchronous"]

[[bin]]
name = "saikuro-rust-schema"
path = "src/cli/saikuro_rust_schema.rs"

[features]
default = ["tcp", "unix", "ws", "storage", "saikuro-exec/tokio-runtime"]
tcp  = ["saikuro-transport/native-transport"]
unix = ["saikuro-transport/native-transport"]
ws   = ["saikuro-transport/native-ws"]
wasm = ["saikuro-transport/wasm-runtime", "saikuro-transport/ws-transport"]

# Storage backends: platform-agnostic factory in storage module
storage         = ["saikuro-storage/native-storage"]
storage-fs      = ["saikuro-storage/fs-storage"]
storage-sled    = ["saikuro-storage/sled-storage"]
storage-sqlite  = ["saikuro-storage/sqlite-storage"]
wasm-storage    = ["saikuro-storage/wasm-storage"]

[dependencies]
saikuro-core      = { path = "../../crates/saikuro-core" }
saikuro-storage   = { path = "../../crates/saikuro-storage", default-features = false }
saikuro-transport = { path = "../../crates/saikuro-transport", default-features = false }

serde       = { version = "1.0", features = ["derive"] }
serde_json  = "1.0.150"
rmp-serde   = "1.3"
bytes       = "1.7"
saikuro-exec = { workspace = true, default-features = false }
futures     = "0.3"
async-trait = "0.1"
tracing     = "0.1"
thiserror   = "2.0"
dashmap     = "6.2.1"
uuid        = { workspace = true }
clap        = { version = "4.5", features = ["derive"] }
syn         = { version = "2.0", features = ["full"] }
