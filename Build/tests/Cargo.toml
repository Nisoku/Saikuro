[package]
name = "saikuro-tests"
description = "All tests for the Saikuro library"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
publish = false

[features]
wasm-runtime = ["saikuro-transport/wasm-runtime"]

[dependencies]
saikuro-core      = { workspace = true }
saikuro-schema    = { workspace = true }
saikuro-router    = { workspace = true }
saikuro-codegen   = { workspace = true }
saikuro           = { workspace = true }
saikuro-exec      = { workspace = true }

bytes         = { workspace = true }
rmp-serde     = { workspace = true }
serde_json    = { workspace = true }
tracing       = { workspace = true }
tracing-subscriber = { workspace = true }

# Native-only: enable TCP/Unix transport backends
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
saikuro-transport = { workspace = true, features = ["native-transport"] }
saikuro-runtime   = { workspace = true, features = ["native-transport"] }

# WASM-only: BroadcastChannel-based host transport, no native-transport
[target.'cfg(target_arch = "wasm32")'.dependencies]
saikuro-transport = { workspace = true, features = ["wasm-runtime"] }
saikuro-runtime   = { workspace = true, default-features = false }
wasm-bindgen = "0.2"
wasm-bindgen-test = "0.3"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
    "BroadcastChannel",
    "MessageEvent",
] }
