[package]
name = "saikuro-storage"
description = "Storage backend abstraction for Saikuro: agnostic file system and key-value access"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
keywords = ["ipc", "cross-language", "saikuro", "storage", "key-value"]

[features]
default = ["native-storage"]
native-storage = [
    "inmemory",
    "local-storage",
    "session-storage",
    "saikuro-exec/tokio-runtime",
]
inmemory = ["dashmap", "parking_lot"]
local-storage = ["inmemory"]
session-storage = ["inmemory"]
fs-storage = ["dep:tokio", "saikuro-exec/tokio-runtime"]
sled-storage = ["dep:tokio", "dep:sled", "saikuro-exec/tokio-runtime"]
sqlite-storage = ["dep:tokio", "dep:rusqlite", "saikuro-exec/tokio-runtime"]
wasm-storage = [
    "inmemory",
    "local-storage",
    "session-storage",
    "saikuro-exec/wasm-runtime",
    "dep:wasm-bindgen",
    "dep:wasm-bindgen-futures",
    "dep:js-sys",
    "dep:web-sys",
]
fs-access = ["wasm-storage"]

[dependencies]
saikuro-core = { workspace = true }
saikuro-exec = { workspace = true, default-features = false }

serde = { workspace = true }
serde_json = { workspace = true }
rmp-serde = { workspace = true }
bytes = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

dashmap = { workspace = true, optional = true }
parking_lot = { workspace = true, optional = true }
tokio = { version = "1.52.3", features = ["rt"], optional = true }
sled = { version = "0.34.7", optional = true }
rusqlite = { version = "0.40.0", features = ["bundled"], optional = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = { version = "0.2.122", optional = true }
wasm-bindgen-futures = { version = "0.4.72", optional = true }
js-sys = { version = "0.3.99", optional = true }
web-sys = { version = "0.3.99", optional = true, features = [
    "Blob",
    "BroadcastChannel",
    "DomException",
    "DomStringList",
    "File",
    "FileSystemCreateWritableOptions",
    "FileSystemDirectoryHandle",
    "FileSystemFileHandle",
    "FileSystemGetDirectoryOptions",
    "FileSystemGetFileOptions",
    "FileSystemHandle",
    "FileSystemHandleKind",
    "FileSystemRemoveOptions",
    "FileSystemWritableFileStream",
    "IdbDatabase",
    "IdbFactory",
    "IdbKeyRange",
    "IdbObjectStore",
    "IdbOpenDbRequest",
    "IdbRequest",
    "IdbTransaction",
    "IdbTransactionMode",
    "IdbVersionChangeEvent",
    "MessageEvent",
    "Navigator",
    "Storage",
    "StorageManager",
    "Window",
] }

[dev-dependencies]
tracing-subscriber = { workspace = true }
