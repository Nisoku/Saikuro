[package]
name = "saikuro-transport"
description = "Transport layer for Saikuro: in-memory, Unix socket, TCP, and WebSocket backends"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
keywords = ["ipc", "cross-language", "saikuro", "transport", "async"]

# Feature flags control which transport backends are compiled in.
#
#   native-transport:  Unix socket + TCP (requires std networking; disabled on wasm32)
#   ws-transport:  WebSocket (works on both native and wasm32)
#
# The in-memory transport is always compiled; it has zero OS dependencies.
[features]
default = ["native-transport"]
native-transport = ["saikuro-exec/tokio-runtime"]
ws-transport = ["dep:tokio-tungstenite", "dep:tungstenite"]

[dependencies]
saikuro-core = { workspace = true }

serde       = { workspace = true }
bytes       = { workspace = true }
rmp-serde   = { workspace = true }
async-trait = { workspace = true }
futures     = { workspace = true }
pin-project-lite = { workspace = true }
thiserror   = { workspace = true }
tracing     = { workspace = true }
saikuro-exec = { workspace = true, default-features = false }

# WebSocket support:  optional
tokio-tungstenite = { version = "0.24", optional = true }
tungstenite       = { version = "0.24", optional = true }

[dev-dependencies]
tracing-subscriber = { workspace = true }
