[package]
name = "saikuro-runtime-server"
description = "Saikuro runtime server: accepts adapter connections over TCP, Unix socket, and WebSocket"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "saikuro-runtime"
path = "src/main.rs"

[features]
default = ["native-transport", "ws-transport"]
native-transport = [
    "saikuro-transport/native-transport",
    "saikuro-runtime-lib/native-transport",
]
ws-transport = [
    "saikuro-transport/ws-transport",
    "saikuro-runtime-lib/ws-transport",
    "dep:tokio-tungstenite",
    "dep:tungstenite",
]

[dependencies]
saikuro-core      = { workspace = true }
saikuro-transport = { workspace = true }
saikuro-runtime-lib = { package = "saikuro-runtime", path = "../saikuro-runtime" }

serde       = { workspace = true }
serde_json  = { workspace = true }
tokio       = { workspace = true }
tracing     = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow      = { workspace = true }

# WebSocket server-side accept (optional, same as ws-transport)
tokio-tungstenite = { version = "0.24", optional = true }
tungstenite       = { version = "0.24", optional = true }

# CLI argument parsing (no extra workspace dep needed; clap is small and well-maintained)
clap = { version = "4.5", features = ["derive", "env"] }
