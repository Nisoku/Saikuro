[package]
name = "saikuro-exec"
description = "Execution and concurrency facade for Saikuro"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[features]
default = ["tokio-runtime"]
tokio-runtime = ["tokio/full", "tokio-util"]
wasm-runtime = ["wasm-bindgen-futures", "fluvio-wasm-timer"]
embassy-runtime = []

[dependencies]
tokio      = { version = "1.52.3", default-features = false, features = ["macros"] }
tokio-util = { version = "0.7.18", features = ["codec"], optional = true }

futures = { workspace = true }
wasm-bindgen-futures = { version = "0.4.71", optional = true }
fluvio-wasm-timer = { version = "0.2.5", optional = true }