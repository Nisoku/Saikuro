name: Rust

on:
  push:
    branches: ["main"]
    paths:
      - "Build/Cargo.toml"
      - "Build/Cargo.lock"
      - "Build/crates/**"
      - "Build/tests/**"
      - "Build/adapters/rust/**"
      - ".github/workflows/rust.yml"
  pull_request:
    paths:
      - "Build/Cargo.toml"
      - "Build/Cargo.lock"
      - "Build/crates/**"
      - "Build/tests/**"
      - "Build/adapters/rust/**"
      - ".github/workflows/rust.yml"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Format + Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@just
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Build/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Build/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - run: just rust fmt_check
      - run: just rust lint

  test:
    name: Tests + WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@just
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Build/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Build/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - run: just rust test
      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown
      - run: just rust wasm_check

  adapter:
    name: Rust adapter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@just
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Build/adapters/rust/target
          key: ${{ runner.os }}-cargo-adapter-${{ hashFiles('Build/adapters/rust/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-adapter-
      - run: just rust adapter_test
