name: TypeScript

on:
  push:
    branches: ["main"]
    paths:
      - "Build/adapters/typescript/**"
      - ".github/workflows/typescript.yml"
  pull_request:
    paths:
      - "Build/adapters/typescript/**"
      - ".github/workflows/typescript.yml"

permissions:
  contents: read

concurrency:
  group: typescript-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint + Typecheck + Build + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@just
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: Build/adapters/typescript/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install Python test deps
        run: python3 -m pip install 'msgpack==1.1.0' 'websockets==13.1'
      - name: Install npm deps
        run: npm ci
        working-directory: Build/adapters/typescript
      - run: just typescript check
