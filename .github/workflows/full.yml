name: Full

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: full-${{ github.ref }}
  cancel-in-progress: true

jobs:
  all:
    name: All checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@just
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools
      - name: Install cmake
        run: sudo apt-get update && sudo apt-get install -y cmake
      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown
      - name: Install wasm-pack
        run: cargo install wasm-pack
      - name: Install Python test deps
        run: python3 -m pip install 'msgpack==1.1.0' 'websockets==13.1'
      - name: Run setup
        run: just setup
      - name: Install npm deps for demo
        run: npm ci
        working-directory: Demo
      - name: Restore C# WASM workload
        run: dotnet workload restore
        working-directory: Build/wasm/csharp/InsightLab
      - name: Run all checks
        run: just check
      - name: Build demo
        run: just web_demo build
