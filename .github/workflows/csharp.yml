name: C#

on:
  push:
    branches: ["main"]
    paths:
      - "Build/adapters/csharp/**"
      - "Build/scripts/csharp.py"
      - "Justfile"
      - ".github/workflows/csharp.yml"
  pull_request:
    paths:
      - "Build/adapters/csharp/**"
      - "Build/scripts/csharp.py"
      - "Justfile"
      - ".github/workflows/csharp.yml"

jobs:
  test:
    name: Build + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@just
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: just csharp check
